default:

  # global random seed
  seed: 12345

  normal:
    # number of samples
    n_samples: 1000
    # mean of the normal distribution
    mean: 0.0
    # standard deviation of the normal distribution
    std_dev: 1.0

  regression:
    # slope of regression
    slope: 2.0
    # white noise variance
    noise: 2.0

  plot:
    # width
    width: 10
    # height
    height: 6